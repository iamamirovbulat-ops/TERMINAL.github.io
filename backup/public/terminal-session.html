<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сессия терминала</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        .session-info {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .session-id {
            font-size: 1.5em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .session-status {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .video-container {
            display: none;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        .video-container.active {
            display: block;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-item {
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .video-item video {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }

        .waiting-message {
            font-size: 1.3em;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 20px 0;
        }

        .pulse {
            display: inline-block;
            width: 15px;
            height: 15px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            margin-right: 10px;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .end-call-btn {
            display: none;
            background: #f44336;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px auto;
            transition: all 0.3s;
        }

        .end-call-btn.active {
            display: block;
        }

        .end-call-btn:hover {
            background: #d32f2f;
            transform: scale(1.05);
        }

        .instructions {
            font-size: 1.1em;
            opacity: 0.8;
            line-height: 1.6;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="session-info">
            <h1>Видеотерминал</h1>
            <div class="session-id">Сессия: <span id="sessionId"></span></div>
            <div class="session-status" id="sessionStatus">Подключение к серверу...</div>
        </div>

        <div id="waitingScreen">
            <div class="waiting-message">
                <span class="pulse"></span>
                Ожидание подключения оператора...
            </div>
            <div class="instructions">
                Оператор скоро подключится к видеосвязи<br>
                Пожалуйста, оставайтесь на месте
            </div>
        </div>

        <div class="video-container" id="videoContainer">
            <div class="video-grid">
                <div class="video-item">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label">Вы</div>
                </div>
                <div class="video-item">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-label">Оператор</div>
                </div>
            </div>
        </div>

        <button class="end-call-btn" id="endCallBtn" onclick="endCall()">
            Завершить звонок
        </button>
    </div>

    <script>
        let socket;
        let localStream;
        let remoteStream;
        let peerConnection;
        let sessionId;

        // Конфигурация WebRTC
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' }
            ]
        };

        // Получаем ID сессии из URL
        function getSessionId() {
            const pathParts = window.location.pathname.split('/');
            return pathParts[pathParts.length - 1];
        }

        // Инициализация
        async function init() {
            try {
                sessionId = getSessionId();
                document.getElementById('sessionId').textContent = sessionId.substr(0, 8) + '...';
                
                // Получаем информацию о сессии
                const response = await fetch('/api/generate-qr');
                const data = await response.json();
                
                // Подключаемся к WebSocket серверу
                const wsUrl = `ws://${window.location.hostname}:8765`;
                socket = new WebSocket(wsUrl);
                
                socket.onopen = () => {
                    console.log('Connected to server');
                    document.getElementById('sessionStatus').textContent = 'Подключен к серверу';
                    
                    // Автоматически отправляем запрос на подключение
                    socket.send(JSON.stringify({
                        type: 'terminal-connect',
                        sessionId: sessionId
                    }));
                    
                    // Показываем ожидание
                    document.getElementById('waitingScreen').style.display = 'block';
                    document.getElementById('sessionStatus').textContent = 'Ожидание оператора...';
                };
                
                socket.onmessage = async (event) => {
                    const data = JSON.parse(event.data);
                    console.log('Received:', data);
                    
                    if (data.type === 'session-started') {
                        console.log('Session started:', data);
                        document.getElementById('sessionStatus').textContent = 'Ожидание оператора...';
                    } else if (data.type === 'operator-connected') {
                        console.log('Operator connected:', data);
                        document.getElementById('sessionStatus').textContent = `Оператор ${data.operatorName} подключен`;
                        document.getElementById('waitingScreen').style.display = 'none';
                        await startVideoCall();
                    } else if (data.type === 'join-room') {
                        console.log('Joining room:', data.roomId);
                    } else if (data.type === 'webrtc-offer') {
                        await handleOffer(data.offer);
                    } else if (data.type === 'webrtc-answer') {
                        await handleAnswer(data.answer);
                    } else if (data.type === 'webrtc-ice-candidate') {
                        await handleIceCandidate(data.candidate);
                    } else if (data.type === 'session-ended') {
                        document.getElementById('sessionStatus').textContent = 'Сессия завершена';
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 3000);
                    }
                };
                
                socket.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    document.getElementById('sessionStatus').textContent = 'Ошибка подключения';
                };
                
                socket.onclose = () => {
                    console.log('WebSocket connection closed');
                };
                
            } catch (error) {
                console.error('Initialization error:', error);
                document.getElementById('sessionStatus').textContent = 'Ошибка подключения';
            }
        }

        async function startVideoCall() {
            try {
                // Получаем локальный видео поток
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('videoContainer').classList.add('active');
                document.getElementById('endCallBtn').classList.add('active');
                
                // Создаем PeerConnection
                peerConnection = new RTCPeerConnection(configuration);
                
                // Добавляем локальный поток
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                // Обрабатываем входящие потоки
                peerConnection.ontrack = (event) => {
                    document.getElementById('remoteVideo').srcObject = event.streams[0];
                };
                
                // Обрабатываем ICE кандидатов
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.send(JSON.stringify({
                            type: 'webrtc-ice-candidate',
                            sessionId: sessionId,
                            candidate: event.candidate
                        }));
                    }
                };
                
                // Создаем и отправляем offer
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                socket.send(JSON.stringify({
                    type: 'webrtc-offer',
                    sessionId: sessionId,
                    offer: offer
                }));
                
            } catch (error) {
                console.error('Video call error:', error);
                document.getElementById('sessionStatus').textContent = 'Ошибка видеосвязи';
            }
        }

        async function handleOffer(offer) {
            console.log('Received offer, creating answer...');
            
            try {
                // Создаем peerConnection если еще нет
                if (!peerConnection) {
                    peerConnection = new RTCPeerConnection(configuration);
                    
                    // Добавляем локальный поток
                    if (!localStream) {
                        localStream = await navigator.mediaDevices.getUserMedia({ 
                            video: true, 
                            audio: true 
                        });
                        document.getElementById('localVideo').srcObject = localStream;
                    }
                    
                    localStream.getTracks().forEach(track => {
                        peerConnection.addTrack(track, localStream);
                    });
                    
                    // Обрабатываем входящие потоки
                    peerConnection.ontrack = (event) => {
                        console.log('Received remote stream');
                        document.getElementById('remoteVideo').srcObject = event.streams[0];
                    };
                    
                    // Обрабатываем ICE кандидатов
                    peerConnection.onicecandidate = (event) => {
                        if (event.candidate) {
                            socket.send(JSON.stringify({
                                type: 'webrtc-ice-candidate',
                                sessionId: sessionId,
                                candidate: event.candidate
                            }));
                        }
                    };
                }
                
                // Устанавливаем remote description (offer от оператора)
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                
                // Создаем answer
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                // Отправляем answer оператору
                socket.send(JSON.stringify({
                    type: 'webrtc-answer',
                    sessionId: sessionId,
                    answer: answer
                }));
                
                // Показываем видео
                document.getElementById('videoContainer').classList.add('active');
                document.getElementById('endCallBtn').classList.add('active');
                
                console.log('Answer sent to operator');
                
            } catch (error) {
                console.error('Error handling offer:', error);
            }
        }

        async function handleAnswer(answer) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        }

        async function handleIceCandidate(candidate) {
            await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        }

        function endCall() {
            // Останавливаем видео
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            if (peerConnection) {
                peerConnection.close();
            }
            
            // Уведомляем сервер
            if (socket && sessionId) {
                socket.send(JSON.stringify({
                    type: 'end-session',
                    sessionId: sessionId
                }));
            }
            
            document.getElementById('sessionStatus').textContent = 'Завершение сессии...';
            
            // Возвращаемся на начальную страницу
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        }

        // Запускаем инициализацию при загрузке страницы
        window.addEventListener('load', init);
    </script>
</body>
</html>
