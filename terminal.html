<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеотерминал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            font-weight: 300;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.5em;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .qr-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin: 30px auto;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        #qrCode {
            width: 300px;
            height: 300px;
            border-radius: 10px;
        }

        .phone-container {
            margin: 40px 0;
            padding: 30px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
        }

        .phone-label {
            font-size: 1.3em;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .phone-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .instructions {
            font-size: 1.2em;
            opacity: 0.8;
            line-height: 1.6;
        }

        .waiting-indicator {
            display: none;
            margin: 30px 0;
        }

        .waiting-indicator.active {
            display: block;
        }

        .pulse {
            display: inline-block;
            width: 20px;
            height: 20px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            margin-right: 10px;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .status-message {
            font-size: 1.4em;
            margin: 20px 0;
            padding: 15px;
            background: rgba(76, 175, 80, 0.2);
            border-radius: 10px;
            border: 2px solid #4CAF50;
        }

        .video-container {
            display: none;
            margin: 20px 0;
        }

        .video-container.active {
            display: block;
        }

        #localVideo, #remoteVideo {
            width: 100%;
            max-width: 400px;
            height: 300px;
            border-radius: 10px;
            margin: 10px;
            background: #000;
        }

        .end-call-btn {
            display: none;
            background: #f44336;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px auto;
            transition: all 0.3s;
        }

        .end-call-btn.active {
            display: block;
        }

        .end-call-btn:hover {
            background: #d32f2f;
            transform: scale(1.05);
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Видеотерминал</h1>
        <p class="subtitle">Свяжитесь с оператором</p>
        
        <div id="welcomeScreen">
            <div class="qr-container">
                <img id="qrCode" src="" alt="QR-код для связи">
                <div style="margin-top: 15px; text-align: center;">
                    <a href="#" id="directLink" target="_blank" style="font-size: 0.9em; color: #667eea;">
                        🧪 Прямая ссылка для теста
                    </a>
                </div>
            </div>
            
            <div class="phone-container">
                <div class="phone-label">Или позвоните по номеру:</div>
                <div class="phone-number" id="phoneNumber"></div>
                <button class="btn btn-primary" onclick="simulateCall()" style="margin-top: 20px;">
                    📞 Имитировать звонок
                </button>
                <div class="instructions">
                    Отсканируйте QR-код или позвоните по номеру телефона<br>
                    для подключения к видеосвязи с оператором
                </div>
            </div>
        </div>

        <div class="waiting-indicator" id="waitingIndicator">
            <div class="status-message">
                <span class="pulse"></span>
                Ожидание подключения оператора...
            </div>
        </div>

        <div class="video-container" id="videoContainer">
            <video id="localVideo" autoplay muted playsinline></video>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>

        <button class="end-call-btn" id="endCallBtn" onclick="endCall()">
            Завершить звонок
        </button>
    </div>

    <script>
        let socket;
        let localStream;
        let remoteStream;
        let peerConnection;
        let sessionId;
        let currentSession = null;

        // Конфигурация WebRTC
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' }
            ]
        };

        // Инициализация
        async function init() {
            try {
                // Загружаем QR-код и номер телефона
                const response = await fetch('/api/generate-qr');
                const data = await response.json();
                
                document.getElementById('qrCode').src = data.qrCode;
                document.getElementById('phoneNumber').textContent = data.phoneNumber;
                sessionId = data.sessionId;
                
                // Добавляем прямую ссылку для тестирования
                const directLink = document.getElementById('directLink');
                const sessionUrl = `/terminal/${sessionId}`;
                directLink.href = sessionUrl;
                directLink.textContent = `🧪 Тест: открыть сессию ${sessionId.substr(0, 8)}...`;
                
                console.log('Terminal page loaded, session ID:', sessionId);
                console.log('Click the link to start session or scan QR code');
                
            } catch (error) {
                console.error('Initialization error:', error);
            }
        }

        function simulateCall() {
            // Переходим на страницу сессии где произойдет подключение
            window.location.href = `/terminal/${sessionId}`;
        }

        function showWaiting() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('waitingIndicator').classList.add('active');
        }

        async function startVideoCall() {
            try {
                // Получаем локальный видео поток
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('videoContainer').classList.add('active');
                document.getElementById('waitingIndicator').style.display = 'none';
                
                // Создаем PeerConnection
                peerConnection = new RTCPeerConnection(configuration);
                
                // Добавляем локальный поток
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                // Обрабатываем входящие потоки
                peerConnection.ontrack = (event) => {
                    document.getElementById('remoteVideo').srcObject = event.streams[0];
                };
                
                // Обрабатываем ICE кандидатов
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.send(JSON.stringify({
                            sessionId: sessionId,
                            candidate: event.candidate
                        }));
                    }
                };
                
                // Создаем и отправляем offer
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                socket.send(JSON.stringify({
                    sessionId: sessionId,
                    offer: offer
                }));
                
            } catch (error) {
                console.error('Video call error:', error);
            }
        }

        async function handleOffer(offer) {
            if (!peerConnection) {
                await startVideoCall();
            }
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            socket.send(JSON.stringify({
                sessionId: sessionId,
                answer: answer
            }));
        }

        async function handleAnswer(answer) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        }

        async function handleIceCandidate(candidate) {
            await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        }

        function simulateCall() {
            // Имитируем звонок - переходим на страницу сессии
            window.location.href = `/terminal/${sessionId}`;
        }

        function endCall() {
            // Останавливаем видео
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            if (peerConnection) {
                peerConnection.close();
            }
            
            // Уведомляем сервер
            if (socket && sessionId) {
                socket.send(JSON.stringify({
                    type: 'end-session',
                    sessionId: sessionId
                }));
            }
            
            // Возвращаемся на начальную страницу
            setTimeout(() => {
                window.location.reload();
            }, 2000);
        }

        // Запускаем инициализацию при загрузке страницы
        window.addEventListener('load', init);
    </script>
</body>
</html>
